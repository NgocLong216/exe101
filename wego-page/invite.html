<!DOCTYPE html>
<html>

<head>

    <title>WeGo</title>

</head>

<body>

<h2>Opening WeGo...</h2>

<script>

    const inviteCode =
    window.location.pathname.split("/").pop();

    window.location.href =
    `myapp://invite/${inviteCode}`;

    setTimeout(() => {

    window.location.href =
    "/";

    },2000);

</script>

</body>

</html>
