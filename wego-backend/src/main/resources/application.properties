spring.application.name=wego-backend
server.port=$

#db
spring.datasource.url=
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# Disable default Spring Security password
spring.security.user.password=disabled

# JWT
jwt.secret=
jwt.expiration-ms=

# Map
goong.api.key=
serp.api.key=

#AI
ai.service.url=
#ai.service.url=http://localhost:8001
ai.service.free-url=${AI_FREE_SERVICE_URL:${ai.service.url}}
ai.service.premium-url=${AI_PREMIUM_SERVICE_URL:}

# payOS / VietQR (server-side secrets only)
payos.client-id=${PAYOS_CLIENT_ID:}
payos.api-key=${PAYOS_API_KEY:}
payos.checksum-key=${PAYOS_CHECKSUM_KEY:}
payos.endpoint=${PAYOS_ENDPOINT:https://api-merchant.payos.vn/v2/payment-requests}
payos.return-url=${PAYOS_RETURN_URL:myapp://payment-result}
payos.cancel-url=${PAYOS_CANCEL_URL:myapp://payment-result?cancelled=true}

